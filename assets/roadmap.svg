<svg viewBox="0 0 1500 1000" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', 'Consolas', monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3B4252" />
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#12161f"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1500" height="1000" fill="url(#bgGrad)"/>

  <!-- Title block -->
  <text x="40" y="50" fill="#E6EDF3" font-size="26" font-weight="700">DSA Roadmap</text>
  <text x="40" y="75" fill="#7D8590" font-size="13">dependency graph — each column unlocks the next</text>

  <!-- Legend -->
  <g transform="translate(1120,30)">
    <circle cx="0" cy="0" r="6" fill="#3FB1CE"/>
    <text x="14" y="4" fill="#9BA4B0" font-size="12">Foundation</text>
    <circle cx="120" cy="0" r="6" fill="#E3A008"/>
    <text x="134" y="4" fill="#9BA4B0" font-size="12">Core</text>
    <circle cx="210" cy="0" r="6" fill="#E85D5D"/>
    <text x="224" y="4" fill="#9BA4B0" font-size="12">Advanced</text>
  </g>

  <!-- Tier labels -->
  <text x="90" y="115" fill="#57606A" font-size="11" letter-spacing="2">TIER 0</text>
  <text x="340" y="115" fill="#57606A" font-size="11" letter-spacing="2">TIER 1</text>
  <text x="590" y="115" fill="#57606A" font-size="11" letter-spacing="2">TIER 2</text>
  <text x="870" y="115" fill="#57606A" font-size="11" letter-spacing="2">TIER 3</text>
  <text x="1160" y="115" fill="#57606A" font-size="11" letter-spacing="2">TIER 4</text>

  <!-- Connectors (drawn first, under nodes) -->
  <g stroke="#3B4252" stroke-width="1.6" fill="none" marker-end="url(#arrow)">
    <!-- Big-O -> everything in tier1 -->
    <path d="M 200 150 C 260 150, 260 195, 320 195"/>
    <path d="M 200 150 C 260 150, 260 260, 320 260"/>
    <path d="M 200 150 C 260 150, 260 325, 320 325"/>
    <path d="M 200 150 C 260 150, 260 390, 320 390"/>
    <path d="M 200 150 C 260 150, 260 455, 320 455"/>

    <!-- Arrays -> Strings, Hashing, Two Pointers, Sorting -->
    <path d="M 460 195 C 510 195, 510 195, 560 195"/>
    <path d="M 460 195 C 510 195, 510 260, 560 260"/>
    <path d="M 460 195 C 510 195, 510 585, 560 585"/>

    <!-- Linked List -> Stacks/Queues -->
    <path d="M 460 260 C 510 260, 510 325, 560 325"/>

    <!-- Recursion -> Trees, Backtracking, DP -->
    <path d="M 460 390 C 510 390, 510 455, 560 455"/>
    <path d="M 460 390 C 510 390, 510 650, 560 650"/>
    <path d="M 460 390 C 510 390, 510 780, 560 780"/>

    <!-- Hashing -> Sliding Window -->
    <path d="M 700 260 C 750 260, 750 195, 800 195"/>

    <!-- Stacks/Queues -> Trees(BFS parts) -->
    <path d="M 700 325 C 750 325, 750 455, 800 455"/>

    <!-- Trees -> BST, Heaps, Graphs -->
    <path d="M 700 455 C 750 455, 750 390, 800 390"/>
    <path d="M 700 455 C 750 455, 750 520, 800 520"/>
    <path d="M 700 455 C 750 455, 750 715, 800 715"/>

    <!-- Sorting -> Greedy -->
    <path d="M 700 585 C 750 585, 750 845, 800 845"/>

    <!-- Backtracking -> Advanced Graphs -->
    <path d="M 700 650 C 750 650, 750 715, 800 715"/>

    <!-- DP(core) -> DP(advanced) -->
    <path d="M 700 780 C 750 780, 750 910, 800 910"/>

    <!-- Tier3 -> Tier4 -->
    <path d="M 940 195 C 1000 195, 1000 260, 1060 260"/>
    <path d="M 940 520 C 1000 520, 1000 260, 1060 260"/>
    <path d="M 940 715 C 1000 715, 1000 650, 1060 650"/>
    <path d="M 940 845 C 1000 845, 1000 780, 1060 780"/>
    <path d="M 940 910 C 1000 910, 1000 780, 1060 780"/>
    <path d="M 940 390 C 1000 390, 1000 520, 1060 520"/>
  </g>

  <!-- Node style helper via reusable rects -->
  <!-- TIER 0 -->
  <g>
    <rect x="90" y="130" width="110" height="40" rx="6" fill="#0F2C33" stroke="#3FB1CE" stroke-width="1.4"/>
    <text x="145" y="154" fill="#E6EDF3" font-size="12" text-anchor="middle">Big-O</text>
  </g>

  <!-- TIER 1 -->
  <g fill="#0F2C33" stroke="#3FB1CE" stroke-width="1.4">
    <rect x="320" y="175" width="140" height="40" rx="6"/>
    <rect x="320" y="240" width="140" height="40" rx="6"/>
    <rect x="320" y="305" width="140" height="40" rx="6"/>
    <rect x="320" y="370" width="140" height="40" rx="6"/>
    <rect x="320" y="435" width="140" height="40" rx="6"/>
  </g>
  <g fill="#E6EDF3" font-size="12" text-anchor="middle">
    <text x="390" y="199">Arrays</text>
    <text x="390" y="264">Linked Lists</text>
    <text x="390" y="329">Hashing</text>
    <text x="390" y="394">Recursion</text>
    <text x="390" y="459">Bit Manipulation</text>
  </g>

  <!-- TIER 2 -->
  <g fill="#12331A" stroke="#E3A008" stroke-width="1.4">
    <rect x="560" y="175" width="140" height="40" rx="6"/>
    <rect x="560" y="240" width="140" height="40" rx="6"/>
    <rect x="560" y="305" width="140" height="40" rx="6"/>
    <rect x="560" y="435" width="140" height="40" rx="6"/>
    <rect x="560" y="565" width="140" height="40" rx="6"/>
    <rect x="560" y="630" width="140" height="40" rx="6"/>
    <rect x="560" y="760" width="140" height="40" rx="6"/>
  </g>
  <g fill="#E6EDF3" font-size="12" text-anchor="middle">
    <text x="630" y="199">Strings</text>
    <text x="630" y="264">Two Pointers</text>
    <text x="630" y="329">Stacks / Queues</text>
    <text x="630" y="459">Trees (Binary)</text>
    <text x="630" y="589">Sorting Algos</text>
    <text x="630" y="654">Backtracking</text>
    <text x="630" y="784">Dynamic Prog. (1D)</text>
  </g>

  <!-- TIER 3 -->
  <g fill="#3A1414" stroke="#E85D5D" stroke-width="1.4">
    <rect x="800" y="175" width="140" height="40" rx="6"/>
    <rect x="800" y="370" width="140" height="40" rx="6"/>
    <rect x="800" y="435" width="140" height="40" rx="6"/>
    <rect x="800" y="500" width="140" height="40" rx="6"/>
    <rect x="800" y="695" width="140" height="40" rx="6"/>
    <rect x="800" y="825" width="140" height="40" rx="6"/>
    <rect x="800" y="890" width="140" height="40" rx="6"/>
  </g>
  <g fill="#E6EDF3" font-size="12" text-anchor="middle">
    <text x="870" y="199">Sliding Window</text>
    <text x="870" y="394">Tries</text>
    <text x="870" y="459">BST</text>
    <text x="870" y="524">Heaps / Priority Q</text>
    <text x="870" y="719">Graphs (BFS/DFS)</text>
    <text x="870" y="849">Greedy Algos</text>
    <text x="870" y="914">DP (2D / Knapsack)</text>
  </g>

  <!-- TIER 4 -->
  <g fill="#2A0F2E" stroke="#C77DFF" stroke-width="1.4">
    <rect x="1060" y="240" width="150" height="40" rx="6"/>
    <rect x="1060" y="500" width="150" height="40" rx="6"/>
    <rect x="1060" y="630" width="150" height="40" rx="6"/>
    <rect x="1060" y="760" width="150" height="40" rx="6"/>
  </g>
  <g fill="#E6EDF3" font-size="12" text-anchor="middle">
    <text x="1135" y="264">Union-Find</text>
    <text x="1135" y="524">Segment Trees</text>
    <text x="1135" y="654">Shortest Paths</text>
    <text x="1135" y="784">DP on Trees/Graphs</text>
  </g>

  <!-- Footer -->
  <text x="40" y="970" fill="#57606A" font-size="12">Each node has: README (theory + complexity) → Python + C++ solutions → practice set</text>
</svg>
